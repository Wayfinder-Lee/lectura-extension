<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LECTURA</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Toolbar -->
  <header class="toolbar">
    <div class="toolbar-left">
      <span class="toolbar-count" id="itemCount">0 项</span>
    </div>
    <div class="toolbar-right">
      <button class="toolbar-btn" id="btnToggleHighlights" title="切换网页标注">
        <svg class="icon-highlights-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <svg class="icon-highlights-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
      </button>
      <span class="toolbar-divider"></span>
      <button class="toolbar-btn" id="btnFontDown" title="缩小字体">A-</button>
      <button class="toolbar-btn" id="btnFontUp" title="放大字体">A+</button>
      <span class="toolbar-divider"></span>
      <button class="toolbar-btn" id="btnToggleDefs" title="隐藏/显示释义">
        <svg class="icon-defs-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="icon-defs-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
      <button class="toolbar-btn" id="btnFilter" title="筛选">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      </button>
      <button class="toolbar-btn" id="btnBatch" title="批量编辑">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </button>
      <button class="toolbar-btn" id="btnExport" title="导出">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="toolbar-btn" id="btnSettings" title="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- Filter Bar (collapsible) -->
  <div class="filter-bar" id="filterBar">
    <div class="filter-row" id="masteryFilter">
      <button class="filter-chip active" data-mastery="all">全部</button>
      <button class="filter-chip" data-mastery="unmastered">未掌握</button>
      <button class="filter-chip" data-mastery="mastered">已掌握</button>
    </div>
    <div class="filter-row" id="colorFilter">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- Batch Edit Bar (independent from filter) -->
  <div class="batch-bar" id="batchBar" style="display:none;">
    <button class="batch-btn danger" id="btnBatchDelete">删除选中</button>
    <button class="batch-btn" id="btnBatchMaster">标记已掌握</button>
    <button class="batch-btn" id="btnBatchUnmaster">取消掌握</button>
    <button class="batch-btn" id="btnBatchCancel">取消</button>
  </div>

  <!-- Add Card Button -->
  <div class="add-card-bar">
    <button class="add-card-btn" id="btnAddCard" title="手动添加单词">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Card List Container -->
  <main class="card-list" id="cardList">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📖</div>
      <p class="empty-title">还没有收藏的单词</p>
      <p class="empty-hint">在网页中选择单词或句子，点击 ☆ 即可收藏</p>
    </div>
  </main>

  <!-- Context Menu (hidden, shown on right-click) -->
  <div class="context-menu" id="contextMenu" style="display:none;">
    <button class="context-item" data-action="edit">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> 编辑
    </button>
    <button class="context-item" data-action="refresh">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> 刷新释义
    </button>
    <button class="context-item" data-action="more-examples">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> 更多例句
    </button>
    <div class="context-divider"></div>
    <div class="context-colors" id="contextColors">
      <!-- Injected by JS -->
    </div>
    <button class="context-item" data-action="remove-color">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> 去掉颜色
    </button>
    <div class="context-divider"></div>
    <button class="context-item danger" data-action="delete">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg> 删除
    </button>
  </div>

  <!-- Edit Modal Overlay -->
  <div class="modal-overlay" id="editModal" style="display:none;">
    <div class="modal-content">
      <h3>编辑卡片</h3>
      <label>单词/句子</label>
      <input type="text" id="editText" class="modal-input">
      <label>音标</label>
      <input type="text" id="editPhonetic" class="modal-input" placeholder="如 /ˈeksəmpəl/">
      <label>词性</label>
      <input type="text" id="editPos" class="modal-input" placeholder="如 n., v.">
      <label>考试词汇</label>
      <input type="text" id="editExamType" class="modal-input" placeholder="如 CET-4, TOEFL, IELTS">
      <label>释义 (每行一个)</label>
      <textarea id="editDefs" class="modal-textarea" rows="3"></textarea>
      <label>例句 (每行一条，格式: 句子 | URL)</label>
      <textarea id="editExamples" class="modal-textarea" rows="4" placeholder="原文例句..."></textarea>
      <label>笔记</label>
      <textarea id="editNote" class="modal-textarea" rows="2" placeholder="添加你自己的笔记..."></textarea>
      <div class="modal-actions">
        <button class="modal-btn primary" id="btnSaveEdit">保存</button>
        <button class="modal-btn" id="btnCancelEdit">取消</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
